services:
  
  meilisearch:
    image: getmeili/meilisearch:v1.12.0 # Pinning a specific, stable version
    container_name: zenher_meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=zenher_local_master_key_123
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  meilisearch_data: